name: flutter_tapresearch
description: TapResearch content & surveys (SDK 3.x) for Android & iOS.
version: 2.0.0
homepage: https://github.com/arnavvaryani/flutter_advertising_plugins

environment:
  sdk: '>=3.5.0 <4.0.0'
  # Swift Package Manager support for iOS plugins requires Flutter 3.24+.
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.anavrinapps.flutter_tapresearch
        pluginClass: FlutterTapresearchPlugin
      ios:
        pluginClass: FlutterTapresearchPlugin

name: flutter_mintegral
description: Mintegral (Mobvista) ad SDK for Android & iOS — rewarded, interstitial, banner & splash.
version: 2.0.0
homepage: https://github.com/arnavvaryani/flutter_advertising_plugins

environment:
  sdk: '>=3.0.0 <4.0.0'
  # iOS integrates via Swift Package Manager, which requires Flutter 3.24+.
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.anavrinapps.flutter_mintegral
        pluginClass: FlutterMintegralPlugin
      ios:
        pluginClass: FlutterMintegralPlugin

 
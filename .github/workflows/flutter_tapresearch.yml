name: flutter_tapresearch CI

on:
  push:
    branches: [main]
    paths:
      - 'flutter_tapresearch-1.4.0/**'
      - '.github/workflows/flutter_tapresearch.yml'
  pull_request:
    paths:
      - 'flutter_tapresearch-1.4.0/**'
      - '.github/workflows/flutter_tapresearch.yml'

defaults:
  run:
    working-directory: flutter_tapresearch-1.4.0

jobs:
  analyze-and-test:
    name: Analyze & test (Dart)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.x'
      # The plugin is SPM-only (no podspec); enabling SPM lets pub get resolve
      # the example's iOS target.
      - run: flutter config --enable-swift-package-manager
      - run: flutter pub get
      - run: flutter analyze lib test
      - run: flutter test

  build-android:
    name: Build example (Android)
    runs-on: ubuntu-latest
    # Resolving the TapResearch SDK requires access to its Artifactory; this
    # job is informational until repo credentials are configured as secrets.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.x'
      - run: flutter config --enable-swift-package-manager
      - run: flutter pub get
      - run: flutter build apk --debug
        working-directory: flutter_tapresearch-1.4.0/example

  build-ios:
    name: Build example (iOS, SPM)
    runs-on: macos-latest
    # Informational until the iOS build is verified against the TapResearch
    # Swift package and a Mac/Xcode toolchain.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.x'
      - run: flutter config --enable-swift-package-manager
      - run: flutter pub get
      - run: flutter build ios --debug --no-codesign
        working-directory: flutter_tapresearch-1.4.0/example
